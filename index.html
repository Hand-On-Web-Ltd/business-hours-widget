<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Hours Widget - Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f9fafb;
    }
    h1 { color: #111827; }
    p { color: #6b7280; line-height: 1.6; }
  </style>
</head>
<body>
  <h1>Business Hours Widget</h1>
  <p>A drop-in widget for any website. Shows your opening hours with a live open/closed indicator.</p>

  <div id="business-hours"></div>

  <script src="widget.js"></script>
  <script>
    BusinessHours.init('#business-hours', {
      timezone: 'Europe/London',
      hours: {
        monday:    { open: '09:00', close: '17:30' },
        tuesday:   { open: '09:00', close: '17:30' },
        wednesday: { open: '09:00', close: '17:30' },
        thursday:  { open: '09:00', close: '17:30' },
        friday:    { open: '09:00', close: '17:00' },
        saturday:  { open: '10:00', close: '14:00' },
        sunday:    null
      }
    });
  </script>
</body>
</html>
